name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"
          dune-cache: true

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Test
        run: opam exec -- dune test

      - name: Run examples
        run: |
          for f in examples/*.bagl; do
            echo "== $f =="
            opam exec -- dune exec baglc -- "$f"
          done

      - name: Build browser playground
        run: |
          opam install -y js_of_ocaml js_of_ocaml-ppx
          opam exec -- dune build --profile release js/bagl_js.bc.js
          node -e "
            const m = require('./_build/default/js/bagl_js.bc.js');
            const r = m.bagl.run('grad (fn x -> x * x * x) 2.0');
            if (!r.ok || r.value !== '12.') { console.error(r); process.exit(1); }
            console.log('playground bundle OK:', JSON.stringify(r));
          "
