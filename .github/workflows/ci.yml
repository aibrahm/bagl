name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"
          dune-cache: true

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Test
        run: opam exec -- dune test

      - name: Build LSP server
        run: opam exec -- dune build lsp/lsp_main.exe

      - name: LSP protocol test
        run: opam exec -- dune test lsp/test --force

      - name: Run examples
        run: |
          for f in examples/*.bagl; do
            echo "== $f =="
            opam exec -- dune exec baglc -- "$f"
          done
